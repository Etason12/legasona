services:
  - type: web
    name: legasona-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && chmod +x start.sh && ./start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: legasona-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production

  - type: web
    name: legasona-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://legasonaimporter.onrender.com/api

databases:
  - name: legasona-db
    plan: free
    databaseName: legasona
    postgresMajorVersion: 16
