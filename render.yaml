services:
  - type: web
    name: legasona-api
    env: python
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn run:app --worker-class sync --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: legasona-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: VITE_API_URL
        value: /api
      - key: NODE_VERSION
        value: "20"

databases:
  - name: legasona-db
    plan: free
    databaseName: legasona
    postgresMajorVersion: 16
