services:
  # Backend API
  - type: web
    name: legasona-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn run:app --worker-class sync --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: legasona-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production

  # Frontend static site
  - type: web
    name: legasona-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: legasona-api
          type: web
          property: url
          path: /api

databases:
  - name: legasona-db
    plan: free
    databaseName: legasona
    postgresMajorVersion: 16
